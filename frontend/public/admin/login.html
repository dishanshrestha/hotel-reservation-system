<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="api-base-url" content="http://127.0.0.1:8000">
    <title>Hotel Admin Login</title>
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/custom.css">
  </head>
  <body class="admin-login-body">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <section class="card shadow-sm admin-card">
            <div class="card-body p-4 p-md-5">
              <p class="small admin-kicker mb-2">Hotel Reservation</p>
              <h1 class="h3 mb-4">Admin Sign In</h1>
              <form id="admin-login-form" novalidate>
                <div class="form-group mb-3">
                  <label for="email">Admin Email</label>
                  <input id="email" name="email" class="form-control" type="email" placeholder="admin@example.com" required>
                </div>
                <div class="form-group mb-4">
                  <label for="password">Password</label>
                  <input id="password" name="password" class="form-control" type="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
              </form>
              <div id="login-message" class="alert d-none mt-3" role="alert"></div>
              <p class="mt-4 mb-0 text-muted">
                Public site:
                <a href="../index.html">Go to website</a>
              </p>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="js/admin-auth.js"></script>
  </body>
</html>
